{% extends "layout/core.html" %}
{% load static %}
{% block content %}

<div class="container-xxl pt-5">
<!-- Testimonial Start -->
  <div class="container">
    <div
      class="text-center text-md-start pb-5 pb-md-0 wow fadeInUp"
      data-wow-delay="0.1s"
      style="max-width: 500px"
    >
      <p class="fs-5 fw-medium text-primary">Alumni</p>
      <h1 class="display-5 mb-5 fw-medium">
        impressions and Messages from Graduates
      </h1>
    </div>
    <div
      class="owl-carousel testimonial-carousel wow fadeInUp"
      data-wow-delay="0.1s"
    >
    
    {% for alumnilk in data_alumnilk %}
    <div class="testimonial-item rounded p-4 p-lg-5 mb-5">
      <img class="mb-4" src="{{ alumnilk.image.url }}" alt="" />
      <p class="mb-4">{{ alumnilk.deskripsi }}</p>
      <h5>{{ alumnilk.nama }}</h5>
      <span class="text-primary">{{ alumnilk.sekolah }}</span>
    </div>
    {% endfor %}
      
    </div>
  </div>
 </div> 
 <!-- Testimonial End -->
 {% endblock %}
